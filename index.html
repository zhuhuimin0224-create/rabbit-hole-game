<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>掉落兔子洞</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a3a2a;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    #game-canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #ui-overlay > * { pointer-events: auto; }

    /* ─── HOME PAGE ─── */
    #home-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 200;
      background: linear-gradient(160deg, #1a3a2a 0%, #2d5a3d 30%, #4a7a5a 55%, #1a3a2a 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Georgia', 'Segoe UI', 'Microsoft YaHei', serif;
      overflow: hidden;
    }
    #home-screen::before {
      content: '';
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,248,220,0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(218,165,32,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .home-sparkle {
      position: absolute; border-radius: 50%; background: rgba(255,215,0,0.6);
      animation: sparkle 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1); }
    }
    .home-title {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(218,165,32,0.5), 0 4px 12px rgba(0,0,0,0.5);
      margin-bottom: 8px;
      letter-spacing: 4px;
      position: relative;
    }
    .home-subtitle {
      font-size: clamp(14px, 3vw, 20px);
      color: rgba(255,255,255,0.7);
      font-style: italic;
      margin-bottom: 30px;
      position: relative;
    }
    .home-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 20px;
      padding: 24px 32px;
      max-width: 380px;
      width: 85%;
      margin-bottom: 30px;
      position: relative;
    }
    .home-card h3 {
      color: #ffd700;
      font-size: 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    .home-rule {
      display: flex; align-items: flex-start; gap: 10px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      margin-bottom: 10px;
      line-height: 1.5;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    .home-rule-icon {
      font-size: 20px;
      flex-shrink: 0;
      margin-top: -2px;
    }
    .home-start-btn {
      padding: 16px 48px;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #daa520, #f4c542);
      color: #1a3a2a;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(218,165,32,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      letter-spacing: 2px;
    }
    .home-start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(218,165,32,0.6);
    }
    .home-start-btn:active {
      transform: scale(0.97);
    }
    .home-deco {
      position: absolute;
      font-size: clamp(24px, 5vw, 40px);
      opacity: 0.15;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Home Screen -->
  <div id="home-screen">
    <div class="home-deco" style="top:8%;left:5%;">🐇</div>
    <div class="home-deco" style="top:15%;right:8%;">🃏</div>
    <div class="home-deco" style="bottom:20%;left:10%;">🍄</div>
    <div class="home-deco" style="bottom:12%;right:6%;">🌹</div>
    <div class="home-deco" style="top:50%;left:3%;">♠</div>
    <div class="home-deco" style="top:40%;right:4%;">♥</div>

    <div class="home-title">掉落兔子洞</div>
    <div class="home-subtitle">Down the Rabbit Hole</div>

    <div class="home-card">
      <h3>游戏规则</h3>
      <div class="home-rule">
        <span class="home-rule-icon">🕳</span>
        <span>你将控制一个神秘的兔子洞在地面上移动，吞下各种奇妙的物品</span>
      </div>
      <div class="home-rule">
        <span class="home-rule-icon">📏</span>
        <span>只有比洞口小的物品才能被吞下，吞得越多，洞口越大</span>
      </div>
      <div class="home-rule">
        <span class="home-rule-icon">🎯</span>
        <span>每一关都有指定的目标物品，完成所有目标即可过关</span>
      </div>
      <div class="home-rule">
        <span class="home-rule-icon">💣</span>
        <span>小心炸弹！吞下炸弹会立刻出局</span>
      </div>
      <div class="home-rule">
        <span class="home-rule-icon">⏱</span>
        <span>注意时间限制，在倒计时结束前完成目标吧</span>
      </div>
    </div>

    <button class="home-start-btn" id="start-btn">开始冒险</button>
  </div>

  <canvas id="game-canvas"></canvas>
  <div id="ui-overlay"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
